<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planning Imprimerie Roue</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>

:root{--bg:#0f0f0f;--surface:#161616;--surface2:#1e1e1e;--border:#2a2a2a;--text:#e8e8e8;--text-dim:#555;--text-mid:#888;--pao:#3b82f6;--atelier:#f59e0b;--textile:#10b981;--livraison:#8b5cf6;--chantier:#ef4444;--pao-bg:#3b82f612;--atelier-bg:#f59e0b12;--textile-bg:#10b98112;--livraison-bg:#8b5cf612;--chantier-bg:#ef444412;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:"DM Sans",sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
header{display:flex;align-items:center;justify-content:space-between;padding:12px 28px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;}
.header-center{display:flex;flex-direction:column;align-items:center;gap:2px;}
.clock{font-family:"DM Mono",monospace;font-size:32px;font-weight:500;color:#fff;letter-spacing:3px;line-height:1;}
.week-num{font-family:"Syne",sans-serif;font-size:10px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:2px;}
.week-nav{display:flex;align-items:center;gap:6px;margin-top:4px;}
.week-nav-btn{font-size:12px;font-weight:600;color:var(--text-mid);background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:3px 10px;cursor:pointer;font-family:"DM Sans",sans-serif;}
.week-nav-btn:hover{color:#fff;border-color:#555;}
.today-btn{color:var(--atelier);border-color:var(--atelier);}
.today-btn:hover{background:var(--atelier);color:#000;}
.date-info{text-align:right;}
.date-info .day-name{font-family:"Syne",sans-serif;font-size:20px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:2px;line-height:1;}
.date-info .full-date{font-family:"DM Mono",monospace;font-size:14px;color:var(--text-mid);margin-top:4px;}
.ticker-wrap{flex-shrink:0;background:#0a0a0a;border-bottom:1px solid var(--border);height:48px;overflow:hidden;display:flex;align-items:center;position:relative;}
.ticker-wrap::before,.ticker-wrap::after{content:"";position:absolute;top:0;bottom:0;width:60px;z-index:2;pointer-events:none;}
.ticker-wrap::before{left:0;background:linear-gradient(to right,#0a0a0a,transparent);}
.ticker-wrap::after{right:0;background:linear-gradient(to left,#0a0a0a,transparent);}
.ticker-track{display:flex;align-items:center;white-space:nowrap;animation:ticker-scroll 40s linear infinite;}
.ticker-track:hover{animation-play-state:paused;}
@keyframes ticker-scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.ticker-item{display:inline-flex;align-items:center;gap:14px;padding:0 80px;font-size:20px;color:var(--text-mid);}
.ticker-dot{width:5px;height:5px;border-radius:50%;background:var(--atelier);flex-shrink:0;}

.grid-corner{background:var(--surface2);border-bottom:2px solid var(--border);border-right:2px solid var(--border);position:sticky;top:0;left:0;z-index:20;display:flex;align-items:center;justify-content:center;}






.sync-status{font-family:"DM Mono",monospace;font-size:11px;color:var(--text-dim);display:flex;align-items:center;gap:6px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text-dim);flex-shrink:0;}
.sync-dot.ok{background:var(--textile);}
.sync-dot.loading{background:var(--atelier);animation:pulse 1s infinite;}
.sync-dot.error{background:var(--chantier);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.grid-wrap{flex:1;overflow:hidden;min-height:0;display:flex;flex-direction:column;}
.planning-grid{display:grid;grid-template-columns:90px repeat(5,1fr);grid-template-rows:auto repeat(5,1fr);flex:1;min-height:0;overflow:hidden;}

.day-header{background:var(--surface);border-bottom:2px solid var(--border);border-left:1px solid var(--border);padding:10px 14px;position:sticky;top:0;z-index:10;display:flex;flex-direction:column;gap:2px;}
.day-header .dh-num{font-family:"Syne",sans-serif;font-size:26px;font-weight:800;color:var(--text);line-height:1;}
.day-header.today .dh-num{color:var(--atelier);}
.day-header .dh-name{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-dim);}
.day-header.today .dh-name{color:var(--atelier);}
.today-pill{display:inline-block;background:var(--atelier);color:#000;font-size:9px;font-weight:700;padding:2px 7px;border-radius:3px;text-transform:uppercase;margin-top:3px;width:fit-content;}
.agenda-label{background:var(--surface2);border-right:2px solid var(--border);border-bottom:1px solid var(--border);padding:6px 8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;min-height:0;overflow:hidden;}
.agenda-label .ag-stripe{width:4px;height:32px;border-radius:2px;flex-shrink:0;}
.agenda-label .ag-name{font-family:"Syne",sans-serif;font-size:12px;font-weight:700;color:#fff;letter-spacing:1px;writing-mode:vertical-rl;text-orientation:mixed;transform:rotate(180deg);}
.day-cell{border-left:1px solid var(--border);border-bottom:1px solid var(--border);padding:5px;overflow:hidden;display:flex;flex-direction:column;gap:3px;min-height:0;}
.day-cell.today-col{background:rgba(245,158,11,0.03);}
.ev-card{border-radius:5px;padding:5px 8px;cursor:pointer;border-left:3px solid transparent;transition:filter 0.1s,transform 0.1s;flex-shrink:0;}
.ev-card:hover{filter:brightness(1.2);transform:translateX(2px);}
.ev-card.selected{box-shadow:0 0 0 2px rgba(255,255,255,0.35);filter:brightness(1.3);}
.ev-card .ec-client{font-family:"Syne",sans-serif;font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2;}
.ev-card .ec-title{font-size:11px;opacity:0.75;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.ev-card .ec-of{font-family:"DM Mono",monospace;font-size:9px;opacity:0.45;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ev-pao{background:var(--pao-bg);border-color:var(--pao);color:#93c5fd;}
.ev-atelier{background:var(--atelier-bg);border-color:var(--atelier);color:#fcd34d;}
.ev-textile{background:var(--textile-bg);border-color:var(--textile);color:#6ee7b7;}
.ev-livraison{background:var(--livraison-bg);border-color:var(--livraison);color:#c4b5fd;}
.ev-chantier{background:var(--chantier-bg);border-color:var(--chantier);color:#fca5a5;}
.detail-panel{position:fixed;right:0;top:0;bottom:0;width:320px;background:var(--surface);border-left:1px solid var(--border);display:none;flex-direction:column;z-index:50;box-shadow:-8px 0 32px rgba(0,0,0,0.5);}
.detail-panel.open{display:flex;}
.dp-header{padding:20px 20px 14px;border-bottom:1px solid var(--border);flex-shrink:0;}
.dp-agenda-tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-bottom:8px;}
.dp-client{font-family:"Syne",sans-serif;font-size:20px;font-weight:800;color:#fff;line-height:1.1;margin-bottom:4px;}
.dp-title{font-size:13px;color:var(--text-mid);margin-bottom:4px;}
.dp-of{font-family:"DM Mono",monospace;font-size:11px;color:var(--text-dim);}
.dp-day{font-family:"DM Mono",monospace;font-size:11px;color:var(--text-dim);margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}
.dp-body{flex:1;overflow-y:auto;padding:14px 20px;}
.dp-row{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px;color:var(--text-mid);}
.dp-row:last-child{border-bottom:none;}
.dp-icon{font-size:14px;flex-shrink:0;}
.dp-text{flex:1;line-height:1.5;}
.dp-empty{color:var(--text-dim);font-size:12px;font-style:italic;line-height:1.6;margin-top:8px;}
.dp-close{margin:14px 20px;padding:9px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;color:var(--text-dim);font-size:11px;cursor:pointer;text-align:left;flex-shrink:0;font-family:"DM Sans",sans-serif;}
.dp-close:hover{color:#fff;border-color:#555;}
.ev-tooltip{display:none;position:fixed;background:#1e1e1e;border:1px solid #3a3a3a;border-left:3px solid #fff;border-radius:6px;padding:10px 14px;z-index:100;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,0.6);min-width:200px;max-width:300px;}
.ev-tooltip.visible{display:block;}
.tt-client{font-family:"Syne",sans-serif;font-size:13px;font-weight:700;color:#fff;margin-bottom:3px;}
.tt-title{font-size:11px;color:#aaa;margin-bottom:2px;}
.tt-of{font-family:"DM Mono",monospace;font-size:10px;color:#666;}

.cell-header{display:flex;align-items:center;justify-content:flex-end;margin-bottom:3px;min-height:18px;}
.btn-more{font-family:"DM Mono",monospace;font-size:9px;color:var(--text-dim);background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:2px 7px;cursor:pointer;white-space:nowrap;transition:color 0.15s,border-color 0.15s;}
.btn-more:hover{color:#fff;border-color:#555;}
.ev-hidden{display:none;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.header-left{display:flex;align-items:center;gap:18px;}
.view-switch{display:flex;border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.view-btn{font-size:12px;font-weight:600;color:var(--text-mid);background:var(--surface2);border:none;padding:6px 15px;cursor:pointer;font-family:"DM Sans",sans-serif;transition:color .15s,background .15s;}
.view-btn:hover{color:#fff;}
.view-btn.active{background:var(--atelier);color:#000;}
.view-btn+.view-btn{border-left:1px solid var(--border);}

</style>
</head>

var weekOffset=0,allEvents=[],selectedCard=null;


function getWeekNumber(d){
  var dt=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  dt.setUTCDate(dt.getUTCDate()+4-(dt.getUTCDay()||7));
  var y=new Date(Date.UTC(dt.getUTCFullYear(),0,1));
  return Math.ceil((((dt-y)/86400000)+1)/7);
}
function getWeekDates(){
  var now=new Date(),day=now.getDay();
  // Start from Monday of current week
  var start=new Date(now);
  start.setDate(now.getDate()-(day===0?6:day-1));
  // Apply day offset, skipping weekends
  var offset=weekOffset;
  if(offset>0){
    var d=new Date(start);
    var moved=0;
    while(moved<offset){
      d.setDate(d.getDate()+1);
      var wd=d.getDay();
      if(wd!==0&&wd!==6) moved++;
    }
    start=d;
  } else if(offset<0){
    var d=new Date(start);
    var moved=0;
    while(moved<Math.abs(offset)){
      d.setDate(d.getDate()-1);
      var wd=d.getDay();
      if(wd!==0&&wd!==6) moved++;
    }
    start=d;
  }
  // Return 5 consecutive working days from start
  var dates=[];
  var d=new Date(start);
  while(dates.length<5){
    var wd=d.getDay();
    if(wd!==0&&wd!==6) dates.push(new Date(d));
    d.setDate(d.getDate()+1);
  }
  return dates;
}
function setSyncStatus(s,l){
  document.getElementById('syncDot').className='sync-dot '+s;
  document.getElementById('syncLabel').textContent=l;
}
function dateToDecimal(s){var d=new Date(s);return d.getHours()+d.getMinutes()/60;}

async function fetchCalendar(key,cal){
  var wd=getWeekDates();
  var tMin=new Date(wd[0]);tMin.setHours(0,0,0,0);
  var tMax=new Date(wd[4]);tMax.setHours(23,59,59,999);
  var url='https://www.googleapis.com/calendar/v3/calendars/'+encodeURIComponent(cal.id)+'/events?key='+API_KEY+'&timeMin='+tMin.toISOString()+'&timeMax='+tMax.toISOString()+'&singleEvents=true&orderBy=startTime&maxResults=100';
  try{
    var res=await fetch(url),data=await res.json();
    if(!data.items)return[];
    return data.items.filter(function(ev){
      if(!ev.start||!ev.start.dateTime||!ev.end||!ev.end.dateTime)return false;
      var dur=(new Date(ev.end.dateTime)-new Date(ev.start.dateTime))/3600000;
      return dur>0&&dur<=10;
    }).map(function(ev){
      var sdt=new Date(ev.start.dateTime);
      var dayIdx=wd.findIndex(function(d){return d.getDate()===sdt.getDate()&&d.getMonth()===sdt.getMonth()&&d.getFullYear()===sdt.getFullYear();});
      if(dayIdx<0)return null;
      var sum=ev.summary||'';
      var parts=sum.split(/\s*[-\u2013]\s*/);
      var client=parts[0].trim().toUpperCase()||sum.toUpperCase();
      var title=parts.length>1?parts.slice(1,parts.length>2?parts.length-1:undefined).join(' - ').trim():'';
      var of=parts.length>2?parts[parts.length-1].trim():'';
      var desc=ev.description||'';
      var details=desc?desc.split('\n').filter(function(l){return l.trim();}).map(function(l){return {icon:'.',text:l.trim()};}):[];
      return {agenda:key,day:dayIdx,start:dateToDecimal(ev.start.dateTime),client:client,title:title,of:of,details:details,rawSummary:sum};
    }).filter(Boolean);
  }catch(e){return[];}
}

async function fetchAllCalendars(){
  setSyncStatus('loading','Chargement...');
  try{
    var results=await Promise.all(AGENDAS.map(function(k){return fetchCalendar(k,CALENDARS[k]);}));
    allEvents=results.flat();
    renderGrid();
    setSyncStatus('ok','Sync '+new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}));
  }catch(e){setSyncStatus('error','Erreur sync');}
}

function renderGrid(){
  var grid=document.getElementById('planningGrid');
  var ROW_SIZE={livraison:'0.55fr'};
  grid.style.gridTemplateRows='auto '+AGENDAS.map(function(k){return ROW_SIZE[k]||'1fr';}).join(' ');
  grid.innerHTML='';
  var wd=getWeekDates(),now=new Date();
  var todayIdx=wd.findIndex(function(d){return d.getDate()===now.getDate()&&d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();});

  // Rebuild grid
  grid.innerHTML='';
  var corner=document.createElement('div');corner.className='grid-corner';grid.appendChild(corner);

  wd.forEach(function(d,i){
    var isToday=i===todayIdx;
    var hdr=document.createElement('div');hdr.className='day-header'+(isToday?' today':'');
    var num=document.createElement('div');num.className='dh-num';num.textContent=d.getDate();
    var nm=document.createElement('div');nm.className='dh-name';var dayNames=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];nm.textContent=dayNames[d.getDay()]+' '+d.toLocaleDateString('fr-FR',{month:'short'});
    hdr.appendChild(num);hdr.appendChild(nm);
    if(isToday){var pill=document.createElement('div');pill.className='today-pill';pill.textContent='Aujourd\u2019hui';hdr.appendChild(pill);}
    grid.appendChild(hdr);
  });

  AGENDAS.forEach(function(agKey){
    var cal=CALENDARS[agKey];
    
    var lbl=document.createElement('div');lbl.className='agenda-label';lbl.dataset.agRow=agKey;
    
    var stripe=document.createElement('div');stripe.className='ag-stripe';stripe.style.background=cal.color;
    var name=document.createElement('div');name.className='ag-name';name.textContent=cal.label;
    lbl.appendChild(stripe);lbl.appendChild(name);grid.appendChild(lbl);

    wd.forEach(function(d,i){
      var isToday=i===todayIdx;
      var cell=document.createElement('div');
      cell.className='day-cell'+(isToday?' today-col':'');
      cell.dataset.agCell=agKey;
      
      var evs=allEvents.filter(function(ev){return ev.agenda===agKey&&ev.day===i;});
      evs.sort(function(a,b){return a.start-b.start;});
      var MAX_VISIBLE=3;
      // Header with "voir plus" button if needed
      if(evs.length>MAX_VISIBLE){
        var hdr=document.createElement('div');hdr.className='cell-header';
        var btnMore=document.createElement('button');
        btnMore.className='btn-more';
        btnMore.textContent='+' + (evs.length-MAX_VISIBLE) + ' voir tout';
        (function(allEvs,dayIdx,agendaKey,calInfo){
          btnMore.addEventListener('click',function(e){
            e.stopPropagation();
            showDayAgenda(allEvs,dayIdx,agendaKey,calInfo);
          });
        })(evs,i,agKey,cal);
        hdr.appendChild(btnMore);
        cell.appendChild(hdr);
      }
      evs.forEach(function(ev,evIdx){
        var card=document.createElement('div');
        card.className='ev-card '+cal.cls+(evIdx>=MAX_VISIBLE?' ev-hidden':'');
        var cEl=document.createElement('div');cEl.className='ec-client';cEl.textContent=ev.client;card.appendChild(cEl);
        if(ev.title){var tEl=document.createElement('div');tEl.className='ec-title';tEl.textContent=ev.title;card.appendChild(tEl);}
        if(ev.of){var oEl=document.createElement('div');oEl.className='ec-of';oEl.textContent=ev.of;card.appendChild(oEl);}
        card._evData=ev;
        card.addEventListener('click',function(e){e.stopPropagation();showDetail(card,ev);});
        card.addEventListener('mouseover',function(e){showTooltip(e,ev,cal);});
        card.addEventListener('mousemove',posTooltip);
        card.addEventListener('mouseout',hideTooltip);
        cell.appendChild(card);
      });
      grid.appendChild(cell);
    });
  });
}


function showDayAgenda(evs,dayIdx,agKey,cal){
  // Deselect any selected card
  if(selectedCard){selectedCard.classList.remove('selected');selectedCard=null;}
  var hdr=document.getElementById('dpHeader');hdr.innerHTML='';
  var tag=document.createElement('div');tag.className='dp-agenda-tag';tag.style.color=cal.color;
  tag.textContent=cal.label+' - '+DAY_NAMES[dayIdx];hdr.appendChild(tag);
  var title=document.createElement('div');title.className='dp-client';
  title.textContent=evs.length+' evenement'+(evs.length>1?'s':'');hdr.appendChild(title);
  var body=document.getElementById('dpBody');body.innerHTML='';
  evs.forEach(function(ev){
    var row=document.createElement('div');row.className='dp-row';row.style.cursor='pointer';row.style.flexDirection='column';row.style.gap='2px';
    var cl=document.createElement('div');cl.style.fontFamily='"Syne",sans-serif';cl.style.fontWeight='700';cl.style.color='#fff';cl.style.fontSize='13px';cl.textContent=ev.client;
    var ti=document.createElement('div');ti.style.fontSize='11px';ti.textContent=ev.title||ev.rawSummary||'';
    row.appendChild(cl);row.appendChild(ti);
    row.addEventListener('click',function(){
      // Find the card in the grid and show its detail
      var cards=document.querySelectorAll('.ev-card');
      for(var k=0;k<cards.length;k++){
        if(cards[k]._evData===ev){showDetail(cards[k],ev);return;}
      }
      // If hidden card, show detail directly
      showDetailDirect(ev,cal);
    });
    body.appendChild(row);
  });
  document.getElementById('detailPanel').classList.add('open');
  document.getElementById('panelTitle').textContent='Journee complete';
}

function showDetailDirect(ev,cal){
  var hdr=document.getElementById('dpHeader');hdr.innerHTML='';
  var tag=document.createElement('div');tag.className='dp-agenda-tag';tag.style.color=cal.color;tag.textContent=cal.label;hdr.appendChild(tag);
  var cl=document.createElement('div');cl.className='dp-client';cl.textContent=ev.client;hdr.appendChild(cl);
  if(ev.title){var ti=document.createElement('div');ti.className='dp-title';ti.textContent=ev.title;hdr.appendChild(ti);}
  if(ev.of){var of=document.createElement('div');of.className='dp-of';of.textContent='OF '+ev.of;hdr.appendChild(of);}
  var day=document.createElement('div');day.className='dp-day';day.textContent=DAY_NAMES[ev.day]||'';hdr.appendChild(day);
  var body=document.getElementById('dpBody');body.innerHTML='';
  if(ev.details&&ev.details.length){
    ev.details.forEach(function(r){
      var row=document.createElement('div');row.className='dp-row';
      var icon=document.createElement('div');icon.className='dp-icon';icon.textContent=r.icon;
      var txt=document.createElement('div');txt.className='dp-text';txt.textContent=r.text;
      row.appendChild(icon);row.appendChild(txt);body.appendChild(row);
    });
  }else{
    var empty=document.createElement('div');empty.className='dp-empty';
    empty.textContent='Ajoutez une description dans Google Calendar pour voir le detail ici.';
    body.appendChild(empty);
  }
  document.getElementById('detailPanel').classList.add('open');
  document.getElementById('panelTitle').textContent='Detail evenement';
}
function showDetail(card,ev){
  if(selectedCard)selectedCard.classList.remove('selected');
  selectedCard=card;card.classList.add('selected');
  var cal=CALENDARS[ev.agenda];
  var hdr=document.getElementById('dpHeader');hdr.innerHTML='';
  var tag=document.createElement('div');tag.className='dp-agenda-tag';tag.style.color=cal.color;tag.textContent=cal.label;hdr.appendChild(tag);
  var cl=document.createElement('div');cl.className='dp-client';cl.textContent=ev.client;hdr.appendChild(cl);
  if(ev.title){var ti=document.createElement('div');ti.className='dp-title';ti.textContent=ev.title;hdr.appendChild(ti);}
  if(ev.of){var of=document.createElement('div');of.className='dp-of';of.textContent='OF '+ev.of;hdr.appendChild(of);}
  var day=document.createElement('div');day.className='dp-day';day.textContent=DAY_NAMES[ev.day]||'';hdr.appendChild(day);
  var body=document.getElementById('dpBody');body.innerHTML='';
  if(ev.details&&ev.details.length){
    ev.details.forEach(function(r){
      var row=document.createElement('div');row.className='dp-row';
      var icon=document.createElement('div');icon.className='dp-icon';icon.textContent=r.icon;
      var txt=document.createElement('div');txt.className='dp-text';txt.textContent=r.text;
      row.appendChild(icon);row.appendChild(txt);body.appendChild(row);
    });
  }else{
    var empty=document.createElement('div');empty.className='dp-empty';
    empty.textContent='Ajoutez une description dans Google Calendar pour voir le detail ici.';
    body.appendChild(empty);
  }
  document.getElementById('detailPanel').classList.add('open');
}
function hideDetail(){
  if(selectedCard){selectedCard.classList.remove('selected');selectedCard=null;}
  document.getElementById('detailPanel').classList.remove('open');
}
document.getElementById('dpClose').addEventListener('click',hideDetail);
document.getElementById('planningGrid').addEventListener('click',function(){hideDetail();});

var tooltip=document.getElementById('evTooltip');
function showTooltip(e,ev,cal){
  document.getElementById('ttClient').textContent=ev.client;
  document.getElementById('ttTitle').textContent=ev.title||'';
  document.getElementById('ttOf').textContent=ev.of?'OF '+ev.of:'';
  document.getElementById('ttOf').style.display=ev.of?'block':'none';
  tooltip.style.borderColor=cal.color;
  tooltip.classList.add('visible');posTooltip(e);
}
function hideTooltip(){tooltip.classList.remove('visible');}
function posTooltip(e){
  var x=e.clientX+14,y=e.clientY+14;
  tooltip.style.left=(x+tooltip.offsetWidth>window.innerWidth?x-tooltip.offsetWidth-28:x)+'px';
  tooltip.style.top=(y+tooltip.offsetHeight>window.innerHeight?y-tooltip.offsetHeight-28:y)+'px';
}


document.getElementById('prevWeek').addEventListener('click',function(){weekOffset--;renderGrid();fetchAllCalendars();});
document.getElementById('nextWeek').addEventListener('click',function(){weekOffset++;renderGrid();fetchAllCalendars();});
document.getElementById('goToday').addEventListener('click',function(){
  weekOffset=getTodayOffset();renderGrid();fetchAllCalendars();
});

function buildTicker(){
  var track=document.getElementById('tickerTrack');
  var msg='Ce planning est un outil d\u2019aide a l\u2019organisation - il oriente, il ne decide pas. Votre experience et votre jugement restent les meilleurs outils de l\u2019atelier.';
  for(var i=0;i<2;i++){
    var s=document.createElement('span');s.className='ticker-item';
    var dot=document.createElement('span');dot.className='ticker-dot';
    s.appendChild(dot);s.appendChild(document.createTextNode(msg));track.appendChild(s);
  }
}


function getTodayOffset(){
  // Calculate weekOffset so that today is the first column
  var now=new Date(),day=now.getDay();
  // If weekend, snap to next Monday
  if(day===6) return 1; // Saturday -> show Monday
  if(day===0) return 0; // Sunday -> show Monday (offset 0 = Mon of this week... actually next)
  // Count working days from Monday to today
  var mon=new Date(now);
  mon.setDate(now.getDate()-(day-1));
  var count=0;
  var d=new Date(mon);
  while(d.getTime()<now.setHours(0,0,0,0)){
    var wd=d.getDay();
    if(wd!==0&&wd!==6) count++;
    d.setDate(d.getDate()+1);
  }
  return count;
}
function updateClock(){
  var now=new Date();
  document.getElementById('clock').textContent=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(now.getSeconds()).padStart(2,'0');
  document.getElementById('dayName').textContent=DAY_FULL[now.getDay()];
  document.getElementById('fullDate').textContent=now.getDate()+' '+MONTHS[now.getMonth()]+' '+now.getFullYear();
  var wd2=getWeekDates();
  var months=['jan','fev','mar','avr','mai','juin','juil','aou','sep','oct','nov','dec'];
  document.getElementById('weekNum').textContent=wd2[0].getDate()+' '+months[wd2[0].getMonth()]+' - '+wd2[4].getDate()+' '+months[wd2[4].getMonth()]+' (S'+getWeekNumber(wd2[0])+')';
}

function applyLieu(target){
  LIEU=(target||'').toLowerCase();
  AGENDAS=(LIEU&&LIEUX[LIEU])?LIEUX[LIEU]:ALL_AGENDAS;
  document.title=(LIEU&&LIEUX[LIEU])?('Planning Roue \u2013 '+LIEU.charAt(0).toUpperCase()+LIEU.slice(1)):'Planning Imprimerie Roue';
  try{history.replaceState(null,'',(LIEU&&LIEUX[LIEU])?('?lieu='+LIEU):window.location.pathname);}catch(e){}
  document.querySelectorAll('.view-btn').forEach(function(b){b.classList.toggle('active',(b.dataset.lieu||'').toLowerCase()===LIEU);});
  weekOffset=getTodayOffset();renderGrid();fetchAllCalendars();
}
function setupViewSwitch(){
  document.querySelectorAll('.view-btn').forEach(function(b){
    b.classList.toggle('active',(b.dataset.lieu||'').toLowerCase()===LIEU);
    b.addEventListener('click',function(){applyLieu(b.dataset.lieu);});
  });
}

buildTicker();setupViewSwitch();weekOffset=getTodayOffset();fetchAllCalendars();updateClock();
setInterval(updateClock,1000);setInterval(function(){weekOffset=getTodayOffset();renderGrid();fetchAllCalendars();},5*60*1000);

</script>
