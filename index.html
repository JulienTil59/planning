<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planning — Imprimerie Roue</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0f0f0f; --surface:#161616; --surface2:#1e1e1e;
    --border:#2a2a2a; --text:#e8e8e8; --text-dim:#666; --text-mid:#999;
    --pao:#3b82f6; --atelier:#f59e0b; --textile:#10b981;
    --livraison:#8b5cf6; --chantier:#ef4444;
    --pao-bg:#3b82f618; --atelier-bg:#f59e0b18; --textile-bg:#10b98118;
    --livraison-bg:#8b5cf618; --chantier-bg:#ef444418;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; height:100vh; display:flex; flex-direction:column; overflow:hidden; }

  header { display:flex; align-items:center; justify-content:space-between; padding:14px 32px; border-bottom:1px solid var(--border); background:var(--surface); flex-shrink:0; }
  .header-center { display:flex; flex-direction:column; align-items:center; gap:2px; }
  .clock { font-family:'DM Mono',monospace; font-size:36px; font-weight:500; color:#fff; letter-spacing:3px; line-height:1; }
  .week-num { font-family:'Syne',sans-serif; font-size:11px; font-weight:700; color:var(--text-dim); text-transform:uppercase; letter-spacing:2px; }
  .week-nav { display:flex; align-items:center; gap:6px; margin-top:4px; }
  .week-nav-btn { font-family:'DM Sans',sans-serif; font-size:12px; font-weight:600; color:var(--text-mid); background:var(--surface2); border:1px solid var(--border); border-radius:5px; padding:3px 10px; cursor:pointer; }
  .week-nav-btn:hover { color:#fff; border-color:#555; }
  .today-btn { color:var(--atelier); border-color:var(--atelier); }
  .today-btn:hover { background:var(--atelier); color:#000; }
  .date-info { text-align:right; }
  .date-info .day-name { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; color:#fff; text-transform:uppercase; letter-spacing:2px; line-height:1; }
  .date-info .full-date { font-family:'DM Mono',monospace; font-size:16px; color:var(--text-mid); margin-top:4px; }

  .ticker-wrap { flex-shrink:0; background:#0a0a0a; border-bottom:1px solid var(--border); height:52px; overflow:hidden; display:flex; align-items:center; position:relative; }
  .ticker-wrap::before,.ticker-wrap::after { content:''; position:absolute; top:0; bottom:0; width:60px; z-index:2; pointer-events:none; }
  .ticker-wrap::before { left:0; background:linear-gradient(to right,#0a0a0a,transparent); }
  .ticker-wrap::after { right:0; background:linear-gradient(to left,#0a0a0a,transparent); }
  .ticker-track { display:flex; align-items:center; white-space:nowrap; animation:ticker-scroll 35s linear infinite; }
  .ticker-track:hover { animation-play-state:paused; }
  @keyframes ticker-scroll { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
  .ticker-item { display:inline-flex; align-items:center; gap:14px; padding:0 80px; font-size:22px; color:var(--text-mid); }
  .ticker-dot { width:5px; height:5px; border-radius:50%; background:var(--atelier); flex-shrink:0; }

  .legend { display:flex; align-items:center; gap:12px; padding:0 32px; border-bottom:2px solid var(--border); background:#111; flex-shrink:0; height:64px; }
  .legend-label { font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1.5px; margin-right:6px; white-space:nowrap; }
  .legend-btn { display:flex; align-items:center; font-family:'Syne',sans-serif; font-size:14px; font-weight:700; color:#fff; border-radius:7px; padding:0 18px; height:40px; overflow:hidden; border:1px solid rgba(255,255,255,0.07); cursor:pointer; transition:opacity 0.15s; user-select:none; }
  .legend-btn.inactive { opacity:0.28; filter:grayscale(0.6); }
  .legend-stripe { width:6px; align-self:stretch; margin-left:-18px; margin-right:14px; flex-shrink:0; }
  .legend-sep { flex:1; }
  .sync-status { font-family:'DM Mono',monospace; font-size:11px; color:var(--text-dim); display:flex; align-items:center; gap:6px; }
  .sync-dot { width:7px; height:7px; border-radius:50%; background:var(--text-dim); flex-shrink:0; }
  .sync-dot.ok { background:var(--textile); }
  .sync-dot.loading { background:var(--atelier); animation:pulse 1s infinite; }
  .sync-dot.error { background:var(--chantier); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .legend-reset { font-family:'DM Sans',sans-serif; font-size:11px; color:var(--text-dim); background:transparent; border:1px solid var(--border); border-radius:5px; padding:6px 14px; cursor:pointer; margin-left:8px; }
  .legend-reset:hover { color:#fff; border-color:#555; }

  main { flex:1; display:grid; grid-template-columns:1fr 300px; overflow:hidden; min-height:0; }
  .calendar-section { display:flex; flex-direction:column; border-right:1px solid var(--border); overflow:hidden; min-height:0; }
  .week-header { display:grid; grid-template-columns:52px repeat(5,1fr); border-bottom:1px solid var(--border); background:var(--surface); flex-shrink:0; }
  .day-col-header { padding:10px 12px; border-left:1px solid var(--border); display:flex; flex-direction:column; gap:2px; }
  .day-col-header .day-num { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; color:var(--text); line-height:1; }
  .day-col-header.today .day-num { color:var(--atelier); }
  .day-col-header .day-name-short { font-size:11px; text-transform:uppercase; letter-spacing:1.5px; color:var(--text-dim); }
  .day-col-header.today .day-name-short { color:var(--atelier); }
  .today-badge { display:inline-block; background:var(--atelier); color:#000; font-size:9px; font-weight:700; padding:2px 6px; border-radius:3px; text-transform:uppercase; margin-top:3px; }
  .calendar-body { flex:1; overflow-y:auto; min-height:0; }
  .time-grid { display:grid; grid-template-columns:52px repeat(5,1fr); position:relative; }
  .time-label { padding:0 8px; font-family:'DM Mono',monospace; font-size:10px; color:var(--text-dim); text-align:right; padding-top:4px; border-top:1px solid var(--border); height:56px; }
  .time-cell { border-left:1px solid var(--border); border-top:1px solid var(--border); height:56px; position:relative; }

  .event { position:absolute; left:3px; right:3px; border-radius:4px; padding:4px 7px; font-size:11px; line-height:1.35; overflow:hidden; cursor:pointer; z-index:2; border-left:3px solid transparent; }
  .event:hover { filter:brightness(1.15); }
  .event.selected { box-shadow:0 0 0 2px rgba(255,255,255,0.4); filter:brightness(1.25); z-index:10; }
  .ev-client { font-family:'Syne',sans-serif; font-size:11px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ev-label { font-size:10px; opacity:0.8; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ev-of { font-family:'DM Mono',monospace; font-size:9px; opacity:0.55; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:1px; }
  .ev-pao       { background:var(--pao-bg);       border-color:var(--pao);       color:#93c5fd; }
  .ev-atelier   { background:var(--atelier-bg);   border-color:var(--atelier);   color:#fcd34d; }
  .ev-textile   { background:var(--textile-bg);   border-color:var(--textile);   color:#6ee7b7; }
  .ev-livraison { background:var(--livraison-bg); border-color:var(--livraison); color:#c4b5fd; }
  .ev-chantier  { background:var(--chantier-bg);  border-color:var(--chantier);  color:#fca5a5; }

  .now-line { position:absolute; height:2px; background:#ef4444; z-index:10; pointer-events:none; }
  .now-dot { position:absolute; left:-4px; top:-4px; width:10px; height:10px; background:#ef4444; border-radius:50%; }

  .sidebar { display:flex; flex-direction:column; overflow:hidden; min-height:0; background:var(--surface); }
  .sidebar-section { padding:16px 18px; border-bottom:1px solid var(--border); flex-shrink:0; }
  .sidebar-title { font-family:'Syne',sans-serif; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:2px; color:var(--text-dim); margin-bottom:12px; }
  .kpi-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .kpi-card { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:10px 12px; }
  .kpi-card.large { grid-column:1/-1; display:flex; align-items:center; gap:20px; padding:14px 18px; }
  .kpi-label { font-size:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; margin-bottom:4px; }
  .kpi-value { font-family:'DM Mono',monospace; font-size:18px; font-weight:500; color:#fff; }
  .kpi-value.green { color:var(--textile); }
  .kpi-value.xl { font-size:52px; line-height:1; color:var(--pao); }
  .kpi-sub { font-size:10px; color:var(--text-dim); margin-top:2px; }
  .kpi-large-right { flex:1; }

  .today-tasks { flex:1; overflow-y:auto; min-height:0; }
  .task-item { display:flex; align-items:flex-start; gap:10px; padding:9px 18px; border-bottom:1px solid var(--border); }
  .task-dot { width:6px; height:6px; border-radius:50%; margin-top:5px; flex-shrink:0; }
  .task-info { flex:1; min-width:0; }
  .task-time { font-family:'DM Mono',monospace; font-size:10px; color:var(--text-dim); margin-bottom:1px; }
  .task-client { font-family:'Syne',sans-serif; font-size:12px; font-weight:700; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .task-detail { font-size:11px; color:var(--text-mid); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  .event-detail { flex:1; display:flex; flex-direction:column; overflow:hidden; min-height:0; }
  .evd-header { padding:16px 18px 12px; border-bottom:1px solid var(--border); flex-shrink:0; }
  .evd-agenda-tag { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:2px; margin-bottom:6px; }
  .evd-client { font-family:'Syne',sans-serif; font-size:18px; font-weight:800; color:#fff; line-height:1.1; margin-bottom:4px; }
  .evd-title { font-size:13px; color:var(--text-mid); margin-bottom:3px; }
  .evd-of { font-family:'DM Mono',monospace; font-size:11px; color:var(--text-dim); }
  .evd-time { font-family:'DM Mono',monospace; font-size:11px; color:var(--text-dim); margin-top:6px; padding-top:6px; border-top:1px solid var(--border); }
  .evd-body { flex:1; overflow-y:auto; padding:12px 18px; min-height:0; }
  .evd-row { display:flex; align-items:flex-start; gap:10px; padding:8px 0; border-bottom:1px solid var(--border); font-size:12px; color:var(--text-mid); }
  .evd-row:last-child { border-bottom:none; }
  .evd-icon { font-size:14px; flex-shrink:0; }
  .evd-text { flex:1; line-height:1.4; }
  .evd-empty { color:var(--text-dim); font-size:12px; font-style:italic; margin-top:8px; line-height:1.6; }
  .evd-close { margin:12px 18px; padding:8px 14px; background:var(--surface2); border:1px solid var(--border); border-radius:5px; color:var(--text-dim); font-size:11px; cursor:pointer; text-align:left; }
  .evd-close:hover { color:#fff; border-color:#555; }

  .ev-tooltip { display:none; position:fixed; background:#1e1e1e; border:1px solid #3a3a3a; border-left:3px solid #fff; border-radius:6px; padding:10px 14px; z-index:100; pointer-events:none; box-shadow:0 8px 24px rgba(0,0,0,0.6); min-width:220px; max-width:320px; }
  .ev-tooltip.visible { display:block; }
  .tt-client { font-family:'Syne',sans-serif; font-size:13px; font-weight:700; color:#fff; margin-bottom:4px; }
  .tt-label { font-size:12px; color:#aaa; margin-bottom:3px; }
  .tt-of { font-family:'DM Mono',monospace; font-size:11px; color:#666; }

  ::-webkit-scrollbar { width:4px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
</style>
</head>

<script>

var CALENDARS = {
  atelier:   { id:'cc4511bec97793febfc9f1bc155c06c04f88691ae726ad6338c1cce01de06748@group.calendar.google.com', color:'#f59e0b', cls:'ev-atelier',  label:'Atelier'   },

  livraison: { id:'0e106f0b12cbafb9b412ca4083c151b516d9ca2717eabc612d05dd35332024ab@group.calendar.google.com', color:'#8b5cf6', cls:'ev-livraison',label:'Livraison' },
  pao:       { id:'ececa8f86e2ec8fca5748b9566b9658d6a94d7f5957b67f17b5fbac2c8e4f268@group.calendar.google.com', color:'#3b82f6', cls:'ev-pao',      label:'PAO'       },
  textile:   { id:'532c6d41fec97e64f03d195cf0211fa09ed5e4e5e549806ceeef7b3c6c017706@group.calendar.google.com', color:'#10b981', cls:'ev-textile',  label:'Textile'   }
};
var START_HOUR=7, END_HOUR=19, SLOT_H=56;
var DAY_NAMES=['Lun','Mar','Mer','Jeu','Ven'];
var MONTHS=['janvier','fevrier','mars','avril','mai','juin','juillet','aout','septembre','octobre','novembre','decembre'];
var DAY_FULL=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
var weekOffset=0, allEvents=[];

function getWeekNumber(d) {
  var date=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  date.setUTCDate(date.getUTCDate()+4-(date.getUTCDay()||7));
  var y=new Date(Date.UTC(date.getUTCFullYear(),0,1));
  return Math.ceil((((date-y)/86400000)+1)/7);
}
function getWeekDates() {
  var now=new Date(), day=now.getDay();
  var mon=new Date(now);
  mon.setDate(now.getDate()-(day===0?6:day-1)+weekOffset*7);
  return Array.from({length:5},function(_,i){var d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
}
function pad(n){return String(Math.floor(n)).padStart(2,'0');}
function fmtTime(dec){return pad(dec)+'h'+pad((dec%1)*60);}
function dateToDecimal(s){var d=new Date(s);return d.getHours()+d.getMinutes()/60;}

function setSyncStatus(state,label){
  document.getElementById('syncDot').className='sync-dot '+state;
  document.getElementById('syncLabel').textContent=label;
}

async function fetchCalendar(key,cal) {
  var wd=getWeekDates();
  var tMin=new Date(wd[0]); tMin.setHours(0,0,0,0);
  var tMax=new Date(wd[4]); tMax.setHours(23,59,59,999);
  var url='https://www.googleapis.com/calendar/v3/calendars/'+encodeURIComponent(cal.id)+'/events?key='+API_KEY+'&timeMin='+tMin.toISOString()+'&timeMax='+tMax.toISOString()+'&singleEvents=true&orderBy=startTime&maxResults=100';
  try {
    var res=await fetch(url), data=await res.json();
    if(!data.items) return [];
    return data.items.filter(function(ev){return ev.start&&ev.start.dateTime&&ev.end&&ev.end.dateTime;}).map(function(ev){
      var sdt=new Date(ev.start.dateTime);
      var dayIdx=wd.findIndex(function(d){return d.getDate()===sdt.getDate()&&d.getMonth()===sdt.getMonth()&&d.getFullYear()===sdt.getFullYear();});
      if(dayIdx<0) return null;
      var sum=ev.summary||'';
      var parts=sum.split(/\s*[–\-]\s*/);
      var client=parts[0].trim().toUpperCase()||sum.toUpperCase();
      var title=parts.length>1?parts.slice(1,parts.length>2?parts.length-1:undefined).join(' - ').trim():'';
      var of=parts.length>2?parts[parts.length-1].trim():'';
      var details=ev.description?ev.description.split('
').filter(function(l){return l.trim();}).map(function(l){return {icon:'·',text:l.trim()};}):[];
      return {agenda:key,day:dayIdx,start:dateToDecimal(ev.start.dateTime),end:dateToDecimal(ev.end.dateTime),client:client,title:title,of:of,details:details,rawSummary:sum};
    }).filter(Boolean);
  } catch(e){return [];}
}

async function fetchAllCalendars() {
  setSyncStatus('loading','Chargement...');
  try {
    var results=await Promise.all(Object.entries(CALENDARS).map(function(e){return fetchCalendar(e[0],e[1]);}));
    allEvents=results.flat();
    renderWeekHeader();
    renderCalendar();
    renderTodayTasks();
    setSyncStatus('ok','Sync '+new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}));
  } catch(e){setSyncStatus('error','Erreur sync');}
}

function renderWeekHeader() {
  var header=document.getElementById('weekHeader');
  while(header.children.length>1) header.removeChild(header.lastChild);
  var wd=getWeekDates(), now=new Date();
  wd.forEach(function(d,i){
    var isToday=weekOffset===0&&d.getDate()===now.getDate()&&d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    var col=document.createElement('div');
    col.className='day-col-header'+(isToday?' today':'');
    col.innerHTML='<div class="day-num">'+d.getDate()+'</div><div class="day-name-short">'+DAY_NAMES[i]+'</div>'+(isToday?'<div class="today-badge">Auj.</div>':'');
    header.appendChild(col);
  });
}

function renderCalendar() {
  var grid=document.getElementById('timeGrid');
  grid.querySelectorAll('.event,.now-line').forEach(function(e){e.remove();});
  var wd=getWeekDates(), now=new Date();
  var todayIdx=wd.findIndex(function(d){return d.getDate()===now.getDate()&&d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();});
  document.getElementById('kpiProduce').textContent=allEvents.filter(function(ev){return ev.day===todayIdx;}).length||'-';
  document.getElementById('kpiWeek').textContent=allEvents.length||'-';
  var byDay={};
  allEvents.forEach(function(ev){if(!byDay[ev.day])byDay[ev.day]=[];byDay[ev.day].push(Object.assign({},ev));});
  Object.values(byDay).forEach(function(dayEvs){
    dayEvs.sort(function(a,b){return a.start-b.start;});
    var columns=[];
    dayEvs.forEach(function(ev){
      var placed=false;
      for(var c=0;c<columns.length;c++){
        var last=columns[c][columns[c].length-1];
        if(Math.max(last.end,last.start+0.5)<=ev.start){columns[c].push(ev);ev._col=c;placed=true;break;}
      }
      if(!placed){ev._col=columns.length;columns.push([ev]);}
    });
    dayEvs.forEach(function(ev){
      var cells=grid.querySelectorAll('.time-cell[data-day="'+ev.day+'"]');
      if(!cells.length) return;
      var idx=Math.floor(ev.start-START_HOUR);
      if(idx<0||idx>=cells.length) return;
      var height=Math.max((ev.end-ev.start)*SLOT_H,0.5*SLOT_H)-2;
      var col=ev._col||0;
      var el=document.createElement('div');
      el.className='event '+(CALENDARS[ev.agenda]?CALENDARS[ev.agenda].cls:'ev-pao');
      el.style.top=((ev.start%1)*SLOT_H)+'px';
      el.style.height=height+'px';
      el.style.left=(3+col*10)+'px';
      el.style.right=(columns.length>1?(columns.length-1-col)*3+3:3)+'%';
      el.style.zIndex=2+col;
      el.innerHTML='<div class="ev-client">'+ev.client+'</div>'+(height>26&&ev.title?'<div class="ev-label">'+ev.title+'</div>':'')+(height>42&&ev.of?'<div class="ev-of">'+ev.of+'</div>':'');
      el._evData=ev;
      cells[idx].appendChild(el);
    });
  });
  if(todayIdx>=0){
    var topPx=((now.getHours()*60+now.getMinutes()-START_HOUR*60)/60)*SLOT_H;
    var nl=document.createElement('div');
    nl.className='now-line';nl.id='nowLine';
    nl.style.top=topPx+'px';nl.style.left='calc(52px + '+todayIdx*20+'%)';nl.style.right=((4-todayIdx)*20)+'%';
    nl.innerHTML='<div class="now-dot"></div>';
    grid.appendChild(nl);
    setTimeout(function(){document.querySelector('.calendar-body').scrollTop=Math.max(0,topPx-120);},100);
  }
  applyFilters();
}

function renderTodayTasks() {
  var wd=getWeekDates(), now=new Date();
  var todayIdx=wd.findIndex(function(d){return d.getDate()===now.getDate()&&d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();});
  var container=document.getElementById('todayTasks');
  container.innerHTML='';
  var todayEvs=allEvents.filter(function(ev){return ev.day===todayIdx;}).sort(function(a,b){return a.start-b.start;});
  if(!todayEvs.length){container.innerHTML='<div style="padding:18px;color:var(--text-dim);font-size:12px;font-style:italic;">Aucun evenement planifie aujourd\'hui.</div>';return;}
  todayEvs.forEach(function(ev){
    var cal=CALENDARS[ev.agenda];
    var item=document.createElement('div');item.className='task-item';
    item.innerHTML='<div class="task-dot" style="background:'+(cal?cal.color:'#999')+'"></div><div class="task-info"><div class="task-time">'+fmtTime(ev.start)+'</div><div class="task-client">'+ev.client+'</div><div class="task-detail">'+(ev.title||ev.rawSummary)+'</div></div>';
    item._taskAgenda=ev.agenda;
    container.appendChild(item);
  });
}

function buildGrid() {
  var grid=document.getElementById('timeGrid');
  for(var h=START_HOUR;h<END_HOUR;h++){
    var lbl=document.createElement('div');lbl.className='time-label';lbl.textContent=String(h).padStart(2,'0')+'h';grid.appendChild(lbl);
    for(var d=0;d<5;d++){var cell=document.createElement('div');cell.className='time-cell';cell.dataset.hour=h;cell.dataset.day=d;grid.appendChild(cell);}
  }
}

function buildTicker() {
  var msg="Ce planning est un outil d'aide a l'organisation - il oriente, il ne decide pas. Votre experience et votre jugement restent les meilleurs outils de l'atelier.";
  var track=document.getElementById('tickerTrack');
  [msg,msg].forEach(function(m){var s=document.createElement('span');s.className='ticker-item';s.innerHTML='<span class="ticker-dot"></span>'+m;track.appendChild(s);});
}

function updateClock() {
  var now=new Date();
  document.getElementById('clock').textContent=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(now.getSeconds()).padStart(2,'0');
  document.getElementById('dayName').textContent=DAY_FULL[now.getDay()];
  document.getElementById('fullDate').textContent=now.getDate()+' '+MONTHS[now.getMonth()]+' '+now.getFullYear();
  document.getElementById('weekNum').textContent='Semaine '+getWeekNumber(now);
  var nl=document.getElementById('nowLine');
  if(nl) nl.style.top=(((now.getHours()*60+now.getMinutes()-START_HOUR*60)/60)*SLOT_H)+'px';
}

var activeFilters=new Set(['pao','atelier','textile','livraison','chantier']);
function applyFilters(){
  document.querySelectorAll('.event').forEach(function(el){el.style.display=(!el._evData||activeFilters.has(el._evData.agenda))?'':'none';});
  document.querySelectorAll('.task-item').forEach(function(el){el.style.display=(!el._taskAgenda||activeFilters.has(el._taskAgenda))?'':'none';});
}
document.querySelectorAll('.legend-btn').forEach(function(btn){
  btn.addEventListener('click',function(){
    var ag=btn.dataset.agenda;
    if(activeFilters.has(ag)){activeFilters.delete(ag);btn.classList.add('inactive');}else{activeFilters.add(ag);btn.classList.remove('inactive');}
    applyFilters();
  });
});
document.getElementById('legendReset').addEventListener('click',function(){
  ['pao','atelier','textile','livraison','chantier'].forEach(function(ag){activeFilters.add(ag);});
  document.querySelectorAll('.legend-btn').forEach(function(b){b.classList.remove('inactive');});
  applyFilters();
});

document.getElementById('prevWeek').addEventListener('click',function(){weekOffset--;fetchAllCalendars();});
document.getElementById('nextWeek').addEventListener('click',function(){weekOffset++;fetchAllCalendars();});
document.getElementById('goToday').addEventListener('click',function(){weekOffset=0;fetchAllCalendars();});

var selectedEl=null;
function showDetail(el,ev){
  if(selectedEl) selectedEl.classList.remove('selected');
  selectedEl=el;el.classList.add('selected');
  var cal=CALENDARS[ev.agenda];
  document.getElementById('evdHeader').innerHTML='<div class="evd-agenda-tag" style="color:'+(cal?cal.color:'#fff')+'">'+(cal?cal.label:ev.agenda)+'</div><div class="evd-client">'+ev.client+'</div>'+(ev.title?'<div class="evd-title">'+ev.title+'</div>':'')+(ev.of?'<div class="evd-of">OF '+ev.of+'</div>':'')+'<div class="evd-time">'+(DAY_NAMES[ev.day]||'')+' '+fmtTime(ev.start)+' &rarr; '+fmtTime(ev.end)+'</div>';
  var body=document.getElementById('evdBody');
  body.innerHTML=ev.details&&ev.details.length?ev.details.map(function(r){return '<div class="evd-row"><div class="evd-icon">'+r.icon+'</div><div class="evd-text">'+r.text+'</div></div>';}).join(''):'<div class="evd-empty">Ajoutez une description dans Google Calendar pour qu\'elle apparaisse ici.</div>';
  document.getElementById('todayTasks').style.display='none';
  document.getElementById('eventDetail').style.display='flex';
  document.getElementById('panelTitle').textContent='Detail evenement';
}
function hideDetail(){
  if(selectedEl){selectedEl.classList.remove('selected');selectedEl=null;}
  document.getElementById('todayTasks').style.display='';
  document.getElementById('eventDetail').style.display='none';
  document.getElementById('panelTitle').textContent='Taches du jour';
}
document.getElementById('timeGrid').addEventListener('click',function(e){
  var el=e.target.closest('.event');
  if(!el||!el._evData){hideDetail();return;}
  if(el===selectedEl){hideDetail();return;}
  showDetail(el,el._evData);
});
document.getElementById('evdClose').addEventListener('click',hideDetail);

var tooltip=document.getElementById('evTooltip');
document.getElementById('timeGrid').addEventListener('mouseover',function(e){
  var el=e.target.closest('.event');
  if(!el||!el._evData) return;
  var ev=el._evData,cal=CALENDARS[ev.agenda];
  document.getElementById('ttClient').textContent=ev.client;
  document.getElementById('ttLabel').textContent=ev.title||'';
  document.getElementById('ttOf').textContent=ev.of||'';
  document.getElementById('ttOf').style.display=ev.of?'block':'none';
  tooltip.style.borderColor=cal?cal.color:'#fff';
  tooltip.classList.add('visible');
  posTooltip(e);
});
document.getElementById('timeGrid').addEventListener('mousemove',function(e){if(tooltip.classList.contains('visible'))posTooltip(e);});
document.getElementById('timeGrid').addEventListener('mouseout',function(e){if(!e.target.closest('.event'))tooltip.classList.remove('visible');});
function posTooltip(e){
  var x=e.clientX+14,y=e.clientY+14;
  tooltip.style.left=(x+tooltip.offsetWidth>window.innerWidth?x-tooltip.offsetWidth-28:x)+'px';
  tooltip.style.top=(y+tooltip.offsetHeight>window.innerHeight?y-tooltip.offsetHeight-28:y)+'px';
}

buildTicker();
buildGrid();
fetchAllCalendars();
updateClock();
setInterval(updateClock,1000);
setInterval(fetchAllCalendars,5*60*1000);
</script>
</body>
</html>
