<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planning — Imprimerie Roué</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f; --surface: #161616; --surface2: #1e1e1e;
    --border: #2a2a2a; --text: #e8e8e8; --text-dim: #666; --text-mid: #999;
    --pao:#3b82f6; --atelier:#f59e0b; --textile:#10b981;
    --livraison:#8b5cf6; --chantier:#ef4444;
    --pao-bg:#3b82f618; --atelier-bg:#f59e0b18; --textile-bg:#10b98118;
    --livraison-bg:#8b5cf618; --chantier-bg:#ef444418;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; height:100vh; display:flex; flex-direction:column; overflow:hidden; }

  /* HEADER */
  header { display:flex; align-items:center; justify-content:space-between; padding:14px 32px; border-bottom:1px solid var(--border); background:var(--surface); flex-shrink:0; }
  .header-center { display:flex; flex-direction:column; align-items:center; gap:2px; }
  .clock { font-family:'DM Mono',monospace; font-size:36px; font-weight:500; color:#fff; letter-spacing:3px; line-height:1; }
  .week-num { font-family:'Syne',sans-serif; font-size:11px; font-weight:700; color:var(--text-dim); text-transform:uppercase; letter-spacing:2px; }
  .date-info { text-align:right; }
  .date-info .day-name { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; color:#fff; text-transform:uppercase; letter-spacing:2px; line-height:1; }
  .date-info .full-date { font-family:'DM Mono',monospace; font-size:16px; color:var(--text-mid); margin-top:4px; }

  /* LEGEND / FILTERS */
  .legend { display:flex; align-items:center; gap:12px; padding:0 32px; border-bottom:2px solid var(--border); background:#111; flex-shrink:0; height:64px; }
  .legend-label { font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1.5px; margin-right:6px; white-space:nowrap; }
  .legend-btn { display:flex; align-items:center; font-family:'Syne',sans-serif; font-size:14px; font-weight:700; color:#fff; border-radius:7px; padding:0 18px; height:40px; letter-spacing:0.5px; overflow:hidden; border:1px solid rgba(255,255,255,0.07); cursor:pointer; transition:opacity 0.15s, transform 0.1s; user-select:none; }
  .legend-btn:hover { transform:translateY(-1px); }
  .legend-btn.inactive { opacity:0.28; filter:grayscale(0.6); transform:none; }
  .legend-stripe { width:6px; align-self:stretch; margin-left:-18px; margin-right:14px; flex-shrink:0; }
  .legend-sep { flex:1; }
  .legend-reset { font-family:'DM Sans',sans-serif; font-size:11px; font-weight:500; color:var(--text-dim); background:transparent; border:1px solid var(--border); border-radius:5px; padding:6px 14px; cursor:pointer; transition:color 0.15s, border-color 0.15s; white-space:nowrap; }
  .legend-reset:hover { color:#fff; border-color:#555; }

  /* MAIN */
  main { flex:1; display:grid; grid-template-columns:1fr 300px; overflow:hidden; min-height:0; }

  /* CALENDAR */
  .calendar-section { display:flex; flex-direction:column; border-right:1px solid var(--border); overflow:hidden; min-height:0; }
  .week-header { display:grid; grid-template-columns:52px repeat(5,1fr); border-bottom:1px solid var(--border); background:var(--surface); flex-shrink:0; }
  .day-col-header { padding:10px 12px; border-left:1px solid var(--border); display:flex; flex-direction:column; gap:2px; }
  .day-col-header .day-num { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; color:var(--text); line-height:1; }
  .day-col-header.today .day-num { color:var(--atelier); }
  .day-col-header .day-name-short { font-size:11px; text-transform:uppercase; letter-spacing:1.5px; color:var(--text-dim); }
  .day-col-header.today .day-name-short { color:var(--atelier); }
  .today-badge { display:inline-block; background:var(--atelier); color:#000; font-size:9px; font-weight:700; letter-spacing:1px; padding:2px 6px; border-radius:3px; text-transform:uppercase; margin-top:3px; }
  .calendar-body { flex:1; overflow-y:auto; min-height:0; }
  .time-grid { display:grid; grid-template-columns:52px repeat(5,1fr); position:relative; }
  .time-label { padding:0 8px; font-family:'DM Mono',monospace; font-size:10px; color:var(--text-dim); text-align:right; padding-top:4px; border-top:1px solid var(--border); height:56px; }
  .time-cell { border-left:1px solid var(--border); border-top:1px solid var(--border); height:56px; position:relative; }

  /* EVENTS */
  .event { position:absolute; left:3px; right:3px; border-radius:4px; padding:4px 7px; font-size:11px; line-height:1.35; overflow:hidden; cursor:pointer; z-index:2; border-left:3px solid transparent; transition:filter 0.1s, box-shadow 0.1s; }
  .event:hover { filter:brightness(1.15); }
  .event.selected { box-shadow:0 0 0 2px rgba(255,255,255,0.4); filter:brightness(1.25); z-index:10; }
  .ev-client { font-family:'Syne',sans-serif; font-size:11px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ev-label { font-size:10px; opacity:0.8; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ev-of { font-family:'DM Mono',monospace; font-size:9px; opacity:0.55; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:1px; }
  .ev-pao      { background:var(--pao-bg);      border-color:var(--pao);      color:#93c5fd; }
  .ev-atelier  { background:var(--atelier-bg);  border-color:var(--atelier);  color:#fcd34d; }
  .ev-textile  { background:var(--textile-bg);  border-color:var(--textile);  color:#6ee7b7; }
  .ev-livraison{ background:var(--livraison-bg);border-color:var(--livraison);color:#c4b5fd; }
  .ev-chantier { background:var(--chantier-bg); border-color:var(--chantier); color:#fca5a5; }

  /* NOW LINE */
  .now-line { position:absolute; height:2px; background:#ef4444; z-index:10; pointer-events:none; }
  .now-dot { position:absolute; left:-4px; top:-4px; width:10px; height:10px; background:#ef4444; border-radius:50%; }

  /* SIDEBAR */
  .sidebar { display:flex; flex-direction:column; overflow:hidden; min-height:0; background:var(--surface); }
  .sidebar-section { padding:16px 18px; border-bottom:1px solid var(--border); flex-shrink:0; }
  .sidebar-title { font-family:'Syne',sans-serif; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:2px; color:var(--text-dim); margin-bottom:12px; }

  /* KPIS */
  .kpi-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .kpi-card { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:10px 12px; }
  .kpi-card.large { grid-column:1/-1; display:flex; align-items:center; gap:20px; padding:14px 18px; }
  .kpi-label { font-size:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; margin-bottom:4px; }
  .kpi-value { font-family:'DM Mono',monospace; font-size:18px; font-weight:500; color:#fff; }
  .kpi-value.green { color:var(--textile); }
  .kpi-value.xl { font-size:52px; line-height:1; color:var(--pao); }
  .kpi-sub { font-size:10px; color:var(--text-dim); margin-top:2px; }
  .kpi-large-right { flex:1; }

  /* TASKS LIST */
  .today-tasks { flex:1; overflow-y:auto; min-height:0; }
  .task-item { display:flex; align-items:flex-start; gap:10px; padding:9px 18px; border-bottom:1px solid var(--border); }
  .task-dot { width:6px; height:6px; border-radius:50%; margin-top:5px; flex-shrink:0; }
  .task-info { flex:1; min-width:0; }
  .task-time { font-family:'DM Mono',monospace; font-size:10px; color:var(--text-dim); margin-bottom:1px; }
  .task-client { font-family:'Syne',sans-serif; font-size:12px; font-weight:700; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .task-detail { font-size:11px; color:var(--text-mid); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  /* EVENT DETAIL PANEL */
  .event-detail { flex:1; display:flex; flex-direction:column; overflow:hidden; min-height:0; }
  .evd-header { padding:16px 18px 12px; border-bottom:1px solid var(--border); flex-shrink:0; }
  .evd-agenda-tag { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:2px; margin-bottom:6px; }
  .evd-client { font-family:'Syne',sans-serif; font-size:18px; font-weight:800; color:#fff; line-height:1.1; margin-bottom:4px; }
  .evd-title { font-size:13px; color:var(--text-mid); margin-bottom:3px; }
  .evd-of { font-family:'DM Mono',monospace; font-size:11px; color:var(--text-dim); }
  .evd-time { font-family:'DM Mono',monospace; font-size:11px; color:var(--text-dim); margin-top:6px; padding-top:6px; border-top:1px solid var(--border); }
  .evd-body { flex:1; overflow-y:auto; padding:12px 18px; min-height:0; }
  .evd-row { display:flex; align-items:flex-start; gap:10px; padding:8px 0; border-bottom:1px solid var(--border); font-size:12px; color:var(--text-mid); }
  .evd-row:last-child { border-bottom:none; }
  .evd-icon { font-size:14px; flex-shrink:0; }
  .evd-text { flex:1; line-height:1.4; }
  .evd-empty { color:var(--text-dim); font-size:12px; font-style:italic; margin-top:8px; line-height:1.6; }
  .evd-close { margin:12px 18px; padding:8px 14px; background:var(--surface2); border:1px solid var(--border); border-radius:5px; color:var(--text-dim); font-size:11px; font-family:'DM Sans',sans-serif; cursor:pointer; text-align:left; transition:color 0.15s, border-color 0.15s; flex-shrink:0; }
  .evd-close:hover { color:#fff; border-color:#555; }

  /* TOOLTIP */
  .ev-tooltip { display:none; position:fixed; background:#1e1e1e; border:1px solid #3a3a3a; border-left:3px solid #fff; border-radius:6px; padding:10px 14px; z-index:100; pointer-events:none; box-shadow:0 8px 24px rgba(0,0,0,0.6); min-width:220px; max-width:320px; }
  .ev-tooltip.visible { display:block; }
  .tt-client { font-family:'Syne',sans-serif; font-size:13px; font-weight:700; color:#fff; margin-bottom:4px; }
  .tt-label { font-size:12px; color:#aaa; margin-bottom:3px; }
  .tt-of { font-family:'DM Mono',monospace; font-size:11px; color:#666; }


  /* TICKER */
  .ticker-wrap {
    flex-shrink: 0;
    background: #0a0a0a;
    border-bottom: 1px solid var(--border);
    height: 52px;
    overflow: hidden;
    display: flex;
    align-items: center;
    position: relative;
  }
  .ticker-wrap::before,
  .ticker-wrap::after {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    width: 60px;
    z-index: 2;
    pointer-events: none;
  }
  .ticker-wrap::before {
    left: 0;
    background: linear-gradient(to right, #0a0a0a, transparent);
  }
  .ticker-wrap::after {
    right: 0;
    background: linear-gradient(to left, #0a0a0a, transparent);
  }
  .ticker-track {
    display: flex;
    align-items: center;
    white-space: nowrap;
    animation: ticker-scroll 40s linear infinite;
    will-change: transform;
  }
  .ticker-track:hover { animation-play-state: paused; }
  @keyframes ticker-scroll {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  .ticker-item {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    padding: 0 80px;
    font-size: 22px;
    color: var(--text-mid);
    letter-spacing: 0.3px;
  }
  .ticker-item .ticker-dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--atelier);
    flex-shrink: 0;
  }
  .ticker-item.highlight { color: var(--text); }
  .ticker-item.highlight .ticker-dot { background: var(--pao); }
  ::-webkit-scrollbar { width:4px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
</style>
</head>

const DAY_FULL   = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];

function getWeekNumber(d) {
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  date.setUTCDate(date.getUTCDate() + 4 - (date.getUTCDay() || 7));
  const y = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
  return Math.ceil((((date - y) / 86400000) + 1) / 7);
}

function getWeekDates() {
  const now = new Date(), day = now.getDay();
  const mon = new Date(now);
  mon.setDate(now.getDate() - (day === 0 ? 6 : day - 1));
  return Array.from({length:5}, (_,i) => { const d=new Date(mon); d.setDate(mon.getDate()+i); return d; });
}

function pad(n) { return String(Math.floor(n)).padStart(2,'0'); }
function fmtTime(dec) { return `${pad(dec)}h${pad((dec%1)*60)}`; }

// ── BUILD CALENDAR ────────────────────────────────────────────────────────
function buildCalendar() {
  const weekDates = getWeekDates();
  const now       = new Date();
  const todayIdx  = weekDates.findIndex(d =>
    d.getDate()===now.getDate() && d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear()
  );

  // KPI
  const count = EVENTS.filter(ev => ev.day===todayIdx && ev.agenda!=='personnel').length;
  document.getElementById('kpiProduce').textContent = count || '—';

  // Day headers
  const header = document.getElementById('weekHeader');
  weekDates.forEach((d,i) => {
    const isToday = i===todayIdx;
    const col = document.createElement('div');
    col.className = 'day-col-header' + (isToday ? ' today' : '');
    col.innerHTML = `<div class="day-num">${d.getDate()}</div><div class="day-name-short">${DAY_NAMES[i]}</div>${isToday?'<div class="today-badge">Aujourd\'hui</div>':''}`;
    header.appendChild(col);
  });

  // Time rows
  const grid = document.getElementById('timeGrid');
  for (let h=START_HOUR; h<END_HOUR; h++) {
    const lbl = document.createElement('div');
    lbl.className = 'time-label';
    lbl.textContent = `${String(h).padStart(2,'0')}h`;
    grid.appendChild(lbl);
    for (let d=0; d<5; d++) {
      const cell = document.createElement('div');
      cell.className = 'time-cell';
      cell.dataset.hour = h;
      cell.dataset.day  = d;
      grid.appendChild(cell);
    }
  }

  // Place events with Apple-style overlap
  const byDay = {};
  EVENTS.forEach(ev => { if(!byDay[ev.day]) byDay[ev.day]=[]; byDay[ev.day].push({...ev}); });

  Object.values(byDay).forEach(dayEvs => {
    dayEvs.sort((a,b) => a.start - b.start);
    const columns = [];
    dayEvs.forEach(ev => {
      let placed = false;
      for (let c=0; c<columns.length; c++) {
        const last = columns[c][columns[c].length-1];
        if (Math.max(last.end, last.start+0.5) <= ev.start) {
          columns[c].push(ev); ev._col = c; placed = true; break;
        }
      }
      if (!placed) { ev._col = columns.length; columns.push([ev]); }
    });

    const totalCols = columns.length;
    dayEvs.forEach(ev => {
      const cells = grid.querySelectorAll(`.time-cell[data-day="${ev.day}"]`);
      if (!cells.length) return;
      const parentCell = cells[Math.floor(ev.start - START_HOUR)];
      if (!parentCell) return;

      const rawH   = (ev.end - ev.start) * SLOT_H;
      const height = Math.max(rawH, 0.5*SLOT_H) - 2;
      const col    = ev._col || 0;
      const multi  = totalCols > 1;
      const leftPx = 3 + col * 10;
      const rightPc= multi ? (4 - col) * 3 : 3;

      const el = document.createElement('div');
      el.className = `event ${AGENDAS[ev.agenda]?.cls || 'ev-pao'}`;
      el.style.top    = `${(ev.start % 1) * SLOT_H}px`;
      el.style.height = `${height}px`;
      el.style.left   = `${leftPx}px`;
      el.style.right  = `${rightPc}%`;
      el.style.zIndex = 2 + col;

      const showLabel = height > 26;
      const showOf    = height > 42;
      el.innerHTML = `
        <div class="ev-client">${ev.client}</div>
        ${showLabel && ev.title ? `<div class="ev-label">${ev.title}</div>` : ''}
        ${showOf    && ev.of    ? `<div class="ev-of">${ev.of}</div>` : ''}
      `;
      el._evData = ev;
      parentCell.appendChild(el);
    });
  });

  // Now line
  if (todayIdx >= 0) {
    const topPx = ((now.getHours()*60 + now.getMinutes() - START_HOUR*60) / 60) * SLOT_H;
    const nl    = document.createElement('div');
    nl.className = 'now-line'; nl.id = 'nowLine';
    nl.style.top   = `${topPx}px`;
    nl.style.left  = `calc(52px + ${todayIdx*20}%)`;
    nl.style.right = `${(4-todayIdx)*20}%`;
    nl.innerHTML   = '<div class="now-dot"></div>';
    grid.appendChild(nl);
    setTimeout(() => { document.querySelector('.calendar-body').scrollTop = Math.max(0, topPx-120); }, 100);
  }
}

// ── BUILD TASKS ───────────────────────────────────────────────────────────
function buildTodayTasks() {
  const container = document.getElementById('todayTasks');
  TODAY_TASKS.forEach(t => {
    const item = document.createElement('div');
    item.className = 'task-item';
    item.innerHTML = `
      <div class="task-dot" style="background:${AGENDAS[t.agenda]?.color||'#999'}"></div>
      <div class="task-info">
        <div class="task-time">${t.time}</div>
        <div class="task-client">${t.client}</div>
        <div class="task-detail">${t.detail}</div>
      </div>`;
    item._taskAgenda = t.agenda;
    container.appendChild(item);
  });
}

// ── CLOCK ─────────────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent   = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
  document.getElementById('dayName').textContent  = DAY_FULL[now.getDay()];
  document.getElementById('fullDate').textContent = `${now.getDate()} ${MONTHS[now.getMonth()]} ${now.getFullYear()}`;
  document.getElementById('weekNum').textContent  = `Semaine ${getWeekNumber(now)}`;
  const nl = document.getElementById('nowLine');
  if (nl) nl.style.top = `${((now.getHours()*60+now.getMinutes()-START_HOUR*60)/60)*SLOT_H}px`;
}

// ── FILTERS ───────────────────────────────────────────────────────────────
const activeFilters = new Set(['pao','atelier','textile','livraison','chantier']);

function applyFilters() {
  document.querySelectorAll('.event').forEach(el => {
    const ag = el._evData?.agenda;
    el.style.display = (!ag || activeFilters.has(ag)) ? '' : 'none';
  });
  document.querySelectorAll('.task-item').forEach(el => {
    const ag = el._taskAgenda;
    el.style.display = (!ag || activeFilters.has(ag)) ? '' : 'none';
  });
}

document.querySelectorAll('.legend-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const ag = btn.dataset.agenda;
    if (activeFilters.has(ag)) { activeFilters.delete(ag); btn.classList.add('inactive'); }
    else                        { activeFilters.add(ag);    btn.classList.remove('inactive'); }
    applyFilters();
  });
});

document.getElementById('legendReset').addEventListener('click', () => {
  ['pao','atelier','textile','livraison','chantier'].forEach(ag => activeFilters.add(ag));
  document.querySelectorAll('.legend-btn').forEach(b => b.classList.remove('inactive'));
  applyFilters();
});

// ── EVENT DETAIL PANEL ────────────────────────────────────────────────────
let selectedEl = null;

function showDetail(el, ev) {
  if (selectedEl) selectedEl.classList.remove('selected');
  selectedEl = el;
  el.classList.add('selected');

  const color = AGENDAS[ev.agenda]?.color || '#fff';
  const label = AGENDAS[ev.agenda]?.label || ev.agenda;
  const day   = DAY_NAMES[ev.day] || '';

  document.getElementById('evdHeader').innerHTML = `
    <div class="evd-agenda-tag" style="color:${color}">${label}</div>
    <div class="evd-client">${ev.client}</div>
    ${ev.title ? `<div class="evd-title">${ev.title}</div>` : ''}
    ${ev.of    ? `<div class="evd-of">OF ${ev.of}</div>`    : ''}
    <div class="evd-time">${day} &nbsp;${fmtTime(ev.start)} → ${fmtTime(ev.end)}</div>
  `;

  const body = document.getElementById('evdBody');
  const rows = ev.details || [];
  body.innerHTML = rows.length
    ? rows.map(r=>`<div class="evd-row"><div class="evd-icon">${r.icon||'·'}</div><div class="evd-text">${r.text}</div></div>`).join('')
    : '<div class="evd-empty">Aucun détail supplémentaire.<br>Une fois connecté à Google Calendar, la description complète de l\'événement s\'affichera ici.</div>';

  document.getElementById('todayTasks').style.display  = 'none';
  document.getElementById('eventDetail').style.display = 'flex';
  document.getElementById('panelTitle').textContent    = 'Détail événement';
}

function hideDetail() {
  if (selectedEl) { selectedEl.classList.remove('selected'); selectedEl = null; }
  document.getElementById('todayTasks').style.display  = '';
  document.getElementById('eventDetail').style.display = 'none';
  document.getElementById('panelTitle').textContent    = 'Tâches du jour';
}

document.getElementById('timeGrid').addEventListener('click', e => {
  const el = e.target.closest('.event');
  if (!el || !el._evData) { hideDetail(); return; }
  if (el === selectedEl)  { hideDetail(); return; }
  showDetail(el, el._evData);
});

document.getElementById('evdClose').addEventListener('click', hideDetail);

// ── TOOLTIP ───────────────────────────────────────────────────────────────
const tooltip  = document.getElementById('evTooltip');
const ttClient = document.getElementById('ttClient');
const ttLabel  = document.getElementById('ttLabel');
const ttOf     = document.getElementById('ttOf');

document.getElementById('timeGrid').addEventListener('mouseover', e => {
  const el = e.target.closest('.event');
  if (!el?._evData) return;
  const ev = el._evData;
  ttClient.textContent       = ev.client;
  ttLabel.textContent        = ev.title || '';
  ttOf.textContent           = ev.of    || '';
  ttOf.style.display         = ev.of    ? 'block' : 'none';
  tooltip.style.borderColor  = AGENDAS[ev.agenda]?.color || '#fff';
  tooltip.classList.add('visible');
  posTooltip(e);
});
document.getElementById('timeGrid').addEventListener('mousemove', e => {
  if (tooltip.classList.contains('visible')) posTooltip(e);
});
document.getElementById('timeGrid').addEventListener('mouseout', e => {
  if (!e.target.closest('.event')) tooltip.classList.remove('visible');
});
function posTooltip(e) {
  const x=e.clientX+14, y=e.clientY+14;
  tooltip.style.left = (x+tooltip.offsetWidth  > window.innerWidth  ? x-tooltip.offsetWidth -28 : x)+'px';
  tooltip.style.top  = (y+tooltip.offsetHeight > window.innerHeight ? y-tooltip.offsetHeight-28 : y)+'px';
}


// ── TICKER ────────────────────────────────────────────────────────────────
const TICKER_MESSAGES = [
  { text: "Ce planning est un outil d'aide à l'organisation — il oriente, il ne décide pas. Votre expérience et votre jugement restent les meilleurs outils de l'atelier.", highlight: true },
];

function buildTicker() {
  const track = document.getElementById('tickerTrack');
  // Duplicate messages for seamless infinite loop
  const allMsgs = [...TICKER_MESSAGES, ...TICKER_MESSAGES];
  allMsgs.forEach(msg => {
    const item = document.createElement('span');
    item.className = 'ticker-item' + (msg.highlight ? ' highlight' : '');
    item.innerHTML = `<span class="ticker-dot"></span>${msg.text}`;
    track.appendChild(item);
  });

  // Adjust animation duration based on content width
  requestAnimationFrame(() => {
    const totalWidth = track.scrollWidth / 2;
    const duration   = totalWidth / 80; // ~80px/sec
    track.style.animationDuration = `${duration}s`;
  });
}

// ── INIT ──────────────────────────────────────────────────────────────────
buildTicker();
buildCalendar();
buildTodayTasks();
updateClock();
setInterval(updateClock, 1000);
</script>
